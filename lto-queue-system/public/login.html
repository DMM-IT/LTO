<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LTO MIMAROPA — Office Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #1a3a6b, #0d47a1); font-family: 'Segoe UI', sans-serif; }
    .login-card { background: white; border-radius: 20px; padding: 40px; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    .logo { text-align: center; margin-bottom: 30px; }
    .logo-circle { width: 80px; height: 80px; background: #0d47a1; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; color: white; font-size: 28px; font-weight: 800; }
    h2 { color: #1a3a6b; font-size: 20px; text-align: center; }
    p { color: #666; font-size: 13px; text-align: center; margin-top: 5px; }
    .form-group { margin-top: 25px; }
    label { display: block; color: #333; font-size: 13px; font-weight: 600; margin-bottom: 8px; }
    select, input { width: 100%; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 15px; outline: none; transition: border 0.2s; }
    select:focus, input:focus { border-color: #0d47a1; }
    button { width: 100%; margin-top: 25px; padding: 14px; background: #0d47a1; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; transition: background 0.2s; }
    button:hover { background: #1565c0; }
    .error { color: #e53935; font-size: 13px; text-align: center; margin-top: 15px; display: none; }
  </style>
</head>
<body style="position:relative;"><div style="position:fixed;inset:0;background:rgba(10,22,40,0.92);z-index:0;pointer-events:none;"></div>
  <div class="login-card">
    <div class="logo">
      <img src="lto-logo.png" style="width:52px;height:52px;object-fit:contain;">
      <h2>LTO MIMAROPA</h2>
      <p>Queue Management System</p>
    </div>
    <div class="form-group">
      <label>Select Office</label>
      <select id="officeCode">
        <option value="">-- Select your office --</option>
        <option value="CALAPAN">Calapan City District Office</option>
        <option value="VICTORIA">Victoria District Office</option>
        <option value="POLA">Pola District Office</option>
        <option value="PALAWAN">Palawan District Office</option>
      </select>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter office password" />
    </div>
    <button onclick="login()">🔐 Login</button>
    <div class="error" id="error">❌ Invalid office code or password!</div>
  </div>
  <script>
    const OFFICES = {
      'CALAPAN': { password: 'Calapan', name: 'Calapan City District Office' },
      'VICTORIA': { password: 'Victoria', name: 'Victoria District Office' },
      'POLA': { password: 'Pola', name: 'Pola District Office' },
      'PALAWAN': { password: 'Palawan', name: 'Palawan District Office' }
    };
    function login() {
      const code = document.getElementById('officeCode').value;
      const pass = document.getElementById('password').value;
      const err = document.getElementById('error');
      if (!code || !pass) { err.style.display='block'; err.textContent='❌ Please select office and enter password!'; return; }
      if (OFFICES[code] && OFFICES[code].password === pass) {
        sessionStorage.setItem('officeId', code);
        sessionStorage.setItem('officeName', OFFICES[code].name);
        window.location.href = 'index.html';
      } else {
        err.style.display = 'block';
        err.textContent = '❌ Invalid office code or password!';
      }
    }
    document.getElementById('password').addEventListener('keypress', e => { if(e.key==='Enter') login(); });
    if (sessionStorage.getItem('officeId')) window.location.href = 'index.html';
  </script>
</body>
</html>
