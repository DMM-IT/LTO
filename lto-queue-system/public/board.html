<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LTO Queue Display Board</title>
<script src="https://lto-production.up.railway.app/socket.io/socket.io.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --blue-dark: #0D47A1; --blue: #1565C0; --blue-mid: #1976D2;
    --blue-light: #42A5F5; --gold: #FFD600; --green: #43A047;
    --red: #E53935; --white: #FFFFFF;
  }
  html, body { background-image: url("lto-logo.png"); background-repeat: no-repeat; background-position: center; background-size: 500px; background-attachment: fixed; height: 100%; font-family: 'Poppins', sans-serif; background: #0A1628; color: var(--white); overflow: hidden; }

  /* HEADER */
  .header { display: grid; grid-template-columns: auto 1fr auto; align-items: center; padding: 10px 24px; background: var(--blue-dark); border-bottom: 3px solid var(--blue-light); }
  .logo-area { display: flex; align-items: center; gap: 12px; }
  .logo-circle { width: 52px; height: 52px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--blue-dark); font-weight: 900; font-size: 16px; }
  .logo-text h1 { font-size: 18px; font-weight: 800; }
  .logo-text p { font-size: 11px; opacity: 0.8; }
  .board-title { text-align: center; font-size: 22px; font-weight: 800; letter-spacing: 3px; color: var(--gold); }
  .clock-area { text-align: right; }
  .clock-time { font-size: 28px; font-weight: 800; color: var(--gold); }
  .clock-date { font-size: 11px; opacity: 0.8; }

  /* STATS */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); background: #0d1f3c; border-bottom: 2px solid #1a3a6b; }
  .stat { text-align: center; padding: 8px; border-right: 1px solid #1a3a6b; }
  .stat:last-child { border-right: none; }
  .stat-num { font-size: 28px; font-weight: 800; }
  .stat-num.blue { color: #42A5F5; } .stat-num.red { color: #EF5350; }
  .stat-num.yellow { color: var(--gold); } .stat-num.green { color: #66BB6A; }
  .stat-label { font-size: 10px; letter-spacing: 1px; opacity: 0.7; text-transform: uppercase; }

  /* MAIN */
  .main { display: grid; grid-template-columns: 1fr 320px; height: calc(100vh - 115px); gap: 0; }

  /* COUNTER GRID */
  .counters-section { padding: 12px; overflow: hidden; }
  .counters-title { font-size: 12px; font-weight: 700; letter-spacing: 2px; color: var(--blue-light); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .counters-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .counter-card { background: #0d1f3c; border: 2px solid #1a3a6b; border-radius: 12px; padding: 12px; text-align: center; transition: all 0.3s; }
  .counter-card.serving { border-color: var(--green); background: #0a2a1a; }
  .counter-card.idle { border-color: #1a3a6b; }
  .counter-card.offline { border-color: #333; opacity: 0.5; }
  .counter-num { font-size: 11px; font-weight: 700; letter-spacing: 1px; opacity: 0.7; text-transform: uppercase; }
  .counter-station { font-size: 11px; color: var(--blue-light); margin: 3px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .counter-ticket { font-size: 26px; font-weight: 900; color: var(--gold); margin: 6px 0; line-height: 1; }
  .counter-ticket.empty { font-size: 20px; color: #444; }
  .counter-status { font-size: 10px; display: flex; align-items: center; justify-content: center; gap: 4px; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; }
  .dot-serving { background: var(--green); animation: pulse 1.5s infinite; }
  .dot-idle { background: #FFD600; }
  .dot-offline { background: #555; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* WAITING QUEUE */
  .queue-section { background: #0d1f3c; border-left: 2px solid #1a3a6b; padding: 12px; overflow-y: auto; }
  .queue-title { font-size: 11px; font-weight: 700; letter-spacing: 2px; color: var(--blue-light); margin-bottom: 10px; }
  .queue-station { background: #0a1628; border: 1px solid #1a3a6b; border-radius: 8px; padding: 10px; margin-bottom: 8px; }
  .queue-station-name { font-size: 11px; font-weight: 700; color: var(--blue-light); margin-bottom: 6px; display: flex; justify-content: space-between; }
  .queue-count { background: var(--blue); border-radius: 10px; padding: 1px 8px; font-size: 11px; }
  .queue-tickets { display: flex; flex-wrap: wrap; gap: 4px; }
  .q-ticket { padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; background: #1a3a6b; }
  .q-ticket.priority { background: #7B3F00; color: var(--gold); }
  .queue-empty { font-size: 11px; opacity: 0.4; font-style: italic; }
</style>
<style>
/* lto-bg-style */
body {
  background-image: url('lto-bg.png') !important;
  background-size: cover !important;
  background-position: center !important;
  background-attachment: fixed !important;
  background-repeat: no-repeat !important;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: rgba(10, 22, 40, 0.88);
  z-index: 0;
  pointer-events: none;
}
body > * { position: relative; z-index: 1; }
</style>
</head>
<body style="position:relative;"><div style="position:fixed;inset:0;background:rgba(10,22,40,0.92);z-index:0;pointer-events:none;"></div>
<div class="header">
  <div class="logo-area">
    <img src="lto-logo.png" style="width:52px;height:52px;object-fit:contain;">
    <div class="logo-text">
      <h1>Land Transportation Office</h1>
      <p class="dyn-office">Calapan City District Office</p>
    </div>
  </div>
  <div class="board-title">QUEUE DISPLAY BOARD</div>
  <div class="clock-area">
    <div class="clock-time" id="time">--:-- --</div>
    <div class="clock-date" id="date"></div>
  </div>
</div>

<div class="stats">
  <div class="stat"><div class="stat-num blue" id="sTotal">0</div><div class="stat-label">Total Today</div></div>
  <div class="stat"><div class="stat-num red" id="sServing">0</div><div class="stat-label">Now Serving</div></div>
  <div class="stat"><div class="stat-num yellow" id="sWaiting">0</div><div class="stat-label">Waiting</div></div>
  <div class="stat"><div class="stat-num green" id="sCompleted">0</div><div class="stat-label">Completed</div></div>
</div>

<div class="main">
  <div class="counters-section">
    <div class="counters-title">🖥 NOW SERVING — WINDOWS</div>
    <div class="counters-grid" id="counterGrid"></div>
  </div>
  <div class="queue-section">
    <div class="queue-title">📋 WAITING QUEUE</div>
    <div id="waitingQueue"></div>
  </div>
</div>

<script>
const OFFICE_ID = sessionStorage.getItem('officeId') || 'DEFAULT';
const SERVER = 'https://lto-production.up.railway.app';
const TOTAL_WINDOWS = 12;

// Dynamic office name
document.addEventListener('DOMContentLoaded', () => {
  const name = sessionStorage.getItem('officeName') || 'Calapan City District Office';
  document.querySelectorAll('.dyn-office').forEach(el => el.textContent = name);
});

// Clock
function updateClock() {
  const now = new Date();
  document.getElementById('time').textContent = now.toLocaleTimeString('en-US', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('date').textContent = now.toLocaleDateString('en-US', {weekday:'long',year:'numeric',month:'long',day:'numeric'});
}
setInterval(updateClock, 1000); updateClock();

// Socket
const socket = io(SERVER, { query: { office: OFFICE_ID } });

function renderCounters(counters) {
  const grid = document.getElementById('counterGrid');
  grid.innerHTML = '';
  for (let i = 1; i <= TOTAL_WINDOWS; i++) {
    const wId = String(i);
    const c = counters[wId];
    const isOnline = c && c.isOnline;
    const isServing = isOnline && c.currentTicket;
    const status = !isOnline ? 'offline' : isServing ? 'serving' : 'idle';
    const dotClass = !isOnline ? 'dot-offline' : isServing ? 'dot-serving' : 'dot-idle';
    const statusText = !isOnline ? 'Offline' : isServing ? 'Serving' : 'Idle';
    grid.innerHTML += `
      <div class="counter-card ${status}">
        <div class="counter-num">Window ${i}</div>
        <div class="counter-station">${c ? c.stationType || '—' : '—'}</div>
        <div class="counter-ticket ${isServing ? '' : 'empty'}">${isServing ? c.currentTicket : '—'}</div>
        <div class="counter-status"><span class="status-dot ${dotClass}"></span>${statusText}</div>
      </div>`;
  }
}

function renderQueue(tickets) {
  const el = document.getElementById('waitingQueue');
  const waiting = tickets.filter(t => t.status === 'WAITING');
  const byStation = {};
  waiting.forEach(t => {
    const st = t.steps[t.currentStepIndex];
    if (!byStation[st]) byStation[st] = [];
    byStation[st].push(t);
  });
  if (!Object.keys(byStation).length) { el.innerHTML = '<div class="queue-empty">No tickets waiting</div>'; return; }
  el.innerHTML = Object.entries(byStation).map(([st, tks]) => `
    <div class="queue-station">
      <div class="queue-station-name">${st}<span class="queue-count">${tks.length}</span></div>
      <div class="queue-tickets">${tks.map(t => `<span class="q-ticket ${t.isPriority?'priority':''}">${t.id}</span>`).join('')}</div>
    </div>`).join('');
}

socket.on('queue-updated', data => {
  document.getElementById('sTotal').textContent = data.totalToday || 0;
  document.getElementById('sServing').textContent = data.servingToday || 0;
  document.getElementById('sWaiting').textContent = data.waitingToday || 0;
  document.getElementById('sCompleted').textContent = data.completedToday || 0;
  renderCounters(data.counters || {});
  renderQueue(data.allTickets || []);
});

fetch(`${SERVER}/api/queue?office=${OFFICE_ID}`)
  .then(r => r.json()).then(data => {
    document.getElementById('sTotal').textContent = data.totalToday || 0;
    document.getElementById('sServing').textContent = data.servingToday || 0;
    document.getElementById('sWaiting').textContent = data.waitingToday || 0;
    document.getElementById('sCompleted').textContent = data.completedToday || 0;
    renderCounters(data.counters || {});
    renderQueue(data.allTickets || []);
  });
</script>
</body>
</html>
